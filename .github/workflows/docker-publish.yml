name: Docker Publish

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  DOCKER_REPO: ${{ secrets.DOCKER_HUB_LOGIN }}
  DOCKER_IMAGE_NAME: pushgateway
  DOCKER_IMAGE_TAG: latest

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: .promu.yml
          cache: true
      - run: go test ./...

  build:
    name: Build and push ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: .promu.yml
          cache: true

      - name: Install promu
        run: make promu

      - name: Set up QEMU (for arm64 base image pull)
        uses: docker/setup-qemu-action@v3

      - name: Cross-compile binary
        run: $(go env GOPATH)/bin/promu crossbuild -p linux/${{ matrix.arch }}

      - name: Build Docker image
        run: |
          make docker-${{ matrix.arch }} \
            DOCKER_REPO=${{ env.DOCKER_REPO }} \
            DOCKER_IMAGE_TAG=${{ env.DOCKER_IMAGE_TAG }}

      - name: Push to Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_HUB_LOGIN }} \
                       -p ${{ secrets.DOCKER_HUB_PASSWORD }}
          make docker-publish-${{ matrix.arch }} \
            DOCKER_REPO=${{ env.DOCKER_REPO }} \
            DOCKER_IMAGE_TAG=${{ env.DOCKER_IMAGE_TAG }}

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Create and push manifest
        run: |
          docker login -u ${{ secrets.DOCKER_HUB_LOGIN }} \
                       -p ${{ secrets.DOCKER_HUB_PASSWORD }}
          make docker-manifest \
            DOCKER_ARCHS="amd64 arm64" \
            DOCKER_REPO=${{ env.DOCKER_REPO }} \
            DOCKER_IMAGE_TAG=${{ env.DOCKER_IMAGE_TAG }}
