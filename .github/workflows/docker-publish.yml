name: Docker Publish

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

env:
  DOCKER_REPO: ${{ secrets.DOCKER_HUB_LOGIN }}
  DOCKER_IMAGE_NAME: pushgateway-ttl

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

  build:
    name: Build and push ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=latest" >> $GITHUB_OUTPUT
          fi

      - name: Install promu
        run: make promu

      - name: Set up QEMU (for arm64 base image pull)
        uses: docker/setup-qemu-action@v3

      - name: Cross-compile binary
        run: $(go env GOPATH)/bin/promu crossbuild -p linux/${{ matrix.arch }}

      - name: Build Docker image
        env:
          DOCKER_IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: make docker-${{ matrix.arch }}

      - name: Push to Docker Hub
        env:
          DOCKER_IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          docker login -u ${{ secrets.DOCKER_HUB_LOGIN }} \
                       -p ${{ secrets.DOCKER_HUB_PASSWORD }}
          make docker-publish-${{ matrix.arch }}

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=latest" >> $GITHUB_OUTPUT
          fi

      - name: Create and push manifest
        env:
          DOCKER_IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          docker login -u ${{ secrets.DOCKER_HUB_LOGIN }} \
                       -p ${{ secrets.DOCKER_HUB_PASSWORD }}
          make docker-manifest DOCKER_ARCHS="amd64 arm64"
